catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade

packages:
  - playground
  - docs
  - packages/*
  - examples/*

catalogs:
  cli:
    '@antfu/eslint-config': ^8.1.1
    '@antfu/ni': ^30.0.0
    bumpp: ^11.0.1
    eslint: ^10.2.0
    lint-staged: ^16.4.0
    simple-git-hooks: ^2.13.1
    tsdown: ^0.17.3
    tsx: ^4.21.0
    typescript: ^6.0.2
  deps:
    '@clack/prompts': ^0.9.1
    kolorist: ^1.8.0
  types:
    '@types/node': ^25.6.0
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
